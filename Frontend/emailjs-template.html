<!--
  EmailJS template for the onboarding welcome email.

  This is a REFERENCE FILE. EmailJS templates live in the dashboard, not in the
  repo — copy the blocks below into your template there.

  ── Dashboard → Email Templates → (your template) → Settings tab ──
    To Email   : {{to_email}}
    From Name  : Cognizant Onboarding
    Reply To   : {{reply_to}}
    Subject    : {{name}}, welcome to Cognizant     ← uses {{name}}

  ── Content tab → switch the editor to "Code"/HTML and paste everything below
     the next comment line ──

  This template intentionally renders ONLY the body and footer note.

  Variables sent from frontend/src/email.js (must match exactly):
    {{to_email}}  recipient address (set in Settings → To Email)
    {{name}}      result.persona.name (used in the Subject)
    {{message}}   email.body   ← line breaks preserved via white-space:pre-wrap
    {{footer}}    the footer note (text defined in email.js)

  Note: EmailJS HTML-escapes variable values, so DON'T pre-convert newlines to
  <br>. The pre-wrap style below renders the body exactly like the preview's
  <pre> block.
-->
<!-- ===================== PASTE FROM HERE INTO "CONTENT" ===================== -->
<div style="margin:0;padding:24px;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#1a1a2e;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;margin:0 auto;background:#ffffff;border:1px solid #e4e6eb;border-radius:12px;overflow:hidden;">

    <!-- Body: the email body. white-space:pre-wrap preserves the newlines. -->
    <tr>
      <td style="padding:24px;">
        <div style="white-space:pre-wrap;word-break:break-word;line-height:1.55;font-size:14px;color:#1f2937;">{{message}}</div>
      </td>
    </tr>

    <!-- Footer note -->
    <tr>
      <td style="padding:14px 24px;background:#fafbfc;border-top:1px solid #eef0f3;font-size:11px;color:#9ca3af;">
        {{footer}}
      </td>
    </tr>

  </table>
</div>
<!-- ====================== PASTE UP TO HERE ====================== -->
